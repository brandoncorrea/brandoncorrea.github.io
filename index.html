<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <link type="text/css" rel="stylesheet" href="styles/stylesheet.css" />
  <link type="text/css" rel="stylesheet" href="styles/game.css" />
  <link type="text/css" rel="stylesheet" href="styles/home.css" />
  <script src="scripts/SettingsRepository.js" type="text/javascript"></script>
  <script src="scripts/TicTacToe.js" type="text/javascript"></script>
  <script src="scripts/script.js" type="text/javascript"></script>
  <script src="scripts/home.js" type="text/javascript"></script>
  <script src="scripts/game.js" type="text/javascript"></script>
</head>
<body>
  
  <!-- Home -->
  <div id="home" class="container">
    <h1>Home</h1>
    
    <!-- Win/Loss -->
    <div class="flex-table">
      <div>Wins: 0</div>
      <div>Losses: 0</div>
    </div>
      
    <div class="flex-table">
      <!-- Player Icon -->
      <div>
        <h3>Player Icon</h3>
        <div class="toggle-pair">
          <button id="userIconX" onclick="updateIcon('X')">X</button>
          <button id="userIconO" onclick="updateIcon('O')">O</button>
        </div>
      </div>
      
      <!-- Who goes first -->
      <div>
        <h3>Who goes first?</h3>
        <div class="toggle-pair">
          <button id="playerButton" onclick="updatePlayerGoesFirst(true)">Player</button>
          <button id="computerButton" onclick="updatePlayerGoesFirst(false)">Computer</button>
        </div>
      </div>
    </div>
    
    <button class="positive" onclick="createNewGame()">New Game</button>
  </div>
  
  <!-- Game -->
  <div id="game" class="container">
    <h1 class="center">Tic Tac Toe</h1>

    <div class="board center">
      <div class="row">
        <div id="square_00"
          onclick="chooseSquare(event)" 
          class="square"></div>
        <div id="square_01"
          onclick="chooseSquare(event)" 
          class="square"></div>
        <div id="square_02"
          onclick="chooseSquare(event)" 
          class="square"></div>
      </div>
      <div class="row">
        <div id="square_10"
          onclick="chooseSquare(event)" 
          class="square"></div>
        <div id="square_11"
          onclick="chooseSquare(event)" 
          class="square"></div>
        <div id="square_12"
          onclick="chooseSquare(event)" 
          class="square"></div>
      </div>
      <div class="row">
        <div id="square_20"
          onclick="chooseSquare(event)" 
          class="square"></div>
        <div id="square_21"
          onclick="chooseSquare(event)" 
          class="square"></div>
        <div id="square_22"
          onclick="chooseSquare(event)" 
          class="square"></div>
      </div>
    </div>

    <button class="negative" onclick="navigate('home')">Quit</button>
  </div>

</body>
</html>
