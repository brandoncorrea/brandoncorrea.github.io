<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <link type="text/css" rel="stylesheet" href="styles/stylesheet.css" />
  <link type="text/css" rel="stylesheet" href="styles/game.css" />
  <link type="text/css" rel="stylesheet" href="styles/home.css" />

  <script src="scripts/Cell.js" type="text/javascript"></script>
  <script src="scripts/TicTacToeBot.js" type="text/javascript"></script>
  <script src="scripts/ScoreRepository.js" type="text/javascript"></script>
  <script src="scripts/Navigation.js" type="text/javascript"></script>
  <script src="scripts/SettingsRepository.js" type="text/javascript"></script>
  <script src="scripts/TicTacToe.js" type="text/javascript"></script>
  <script src="scripts/GameUI.js" type="text/javascript"></script>
  <script src="scripts/script.js" type="text/javascript"></script>
  <script src="scripts/home.js" type="text/javascript"></script>
  <script src="scripts/game.js" type="text/javascript"></script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Tic Tac Toe game" />
  <meta http-equiv="cache-control" content="no-cache, must-revalidate, post-check=0, pre-check=0" />
  <meta http-equiv="cache-control" content="max-age=0" />
  <meta http-equiv="expires" content="0" />
  <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
  <meta http-equiv="pragma" content="no-cache" />
</head>
<body>
  
  <!-- Home -->
  <div id="home" class="container">
    <h1>Home</h1>
    
    <!-- Win/Loss -->
    <div class="flex-table">
      <div>Wins: <span id="winsLabel"></span></div>
      <div>Draws: <span id="drawsLabel"></span></div>
      <div>Losses: <span id="lossesLabel"></span></div>
    </div>
    
    <div class="flex-table">
      <!-- Player Icon -->
      <div>
        <h3>Player Icon</h3>
        <div class="toggle-pair">
          <button id="userIconX" onclick="onIconChanged('X')">X</button>
          <button id="userIconO" onclick="onIconChanged('O')">O</button>
        </div>
      </div>
      
      <!-- Who goes first -->
      <div>
        <h3>Who goes first?</h3>
        <div class="toggle-pair">
          <button id="playerButton" onclick="onFirstPlayerChanged(true)">Player</button>
          <button id="computerButton" onclick="onFirstPlayerChanged(false)">Computer</button>
        </div>
      </div>
    </div>
    
    <div class="button-group">
      <button class="positive" onclick="onNewGameClicked()">New Game</button>
    </div>
  </div>
  
  <!-- Game -->
  <div id="game" class="container">
    <h1>Tic Tac Toe</h1>
    <h3 id="gameMessage"></h3>
    <div class="board">
      <div class="row">
        <div id="square_00"
          onclick="onSquareClicked(event)" 
          class="square"></div>
        <div id="square_01"
          onclick="onSquareClicked(event)" 
          class="square"></div>
        <div id="square_02"
          onclick="onSquareClicked(event)" 
          class="square"></div>
      </div>
      <div class="row">
        <div id="square_10"
          onclick="onSquareClicked(event)" 
          class="square"></div>
        <div id="square_11"
          onclick="onSquareClicked(event)" 
          class="square"></div>
        <div id="square_12"
          onclick="onSquareClicked(event)" 
          class="square"></div>
      </div>
      <div class="row">
        <div id="square_20"
          onclick="onSquareClicked(event)" 
          class="square"></div>
        <div id="square_21"
          onclick="onSquareClicked(event)" 
          class="square"></div>
        <div id="square_22"
          onclick="onSquareClicked(event)" 
          class="square"></div>
      </div>
    </div>

    <div class="button-group">
      <button class="negative" onclick="onQuitGameClicked()">Quit</button>
    </div>
  </div>

</body>
</html>
